seed: 42
num_steps_per_env: 32
max_iterations: 500
obs_groups:
  actor:
  - actor
  critic:
  - critic
save_interval: 50
experiment_name: taluy_position_6d
run_name: position_curriculum_settle_v1
logger: tensorboard
wandb_project: auvrl
wandb_tags: []
resume: false
load_run: .*
load_checkpoint: model_.*.pt
clip_actions: 1.0
upload_model: false
class_name: OnPolicyRunner
actor:
  hidden_dims:
  - 512
  - 256
  - 128
  activation: elu
  obs_normalization: true
  cnn_cfg: null
  distribution_cfg:
    class_name: GaussianDistribution
    init_std: 0.6
    std_type: scalar
  class_name: MLPModel
critic:
  hidden_dims:
  - 512
  - 256
  - 128
  activation: elu
  obs_normalization: true
  cnn_cfg: null
  distribution_cfg: null
  class_name: MLPModel
algorithm:
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.002
  desired_kl: 0.01
  max_grad_norm: 1.0
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  optimizer: adam
  share_cnn_encoders: false
  class_name: PPO
